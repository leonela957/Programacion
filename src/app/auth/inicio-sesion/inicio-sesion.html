<h1>INICIO DE SESIÓN</h1>

<div class="form-container">
  <form action="">
    <div class="mb-3">
      <label for="email/usuario" class="form-label">Ingrese su e-mail/Nombre de usuario</label>
      <input type="text" class="form-control" id="email/usuario" placeholder="tu@email.com o usuario">
    </div>
    <div class="mb-3">
      <label for="contraseña" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="contraseña" placeholder="********">
    </div>
    <button type="submit" class="btn btn-primary">Iniciar sesión</button>
  </form>
</div>
