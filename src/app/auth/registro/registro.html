
  <h1>REGISTRO DE SESIÓN</h1>
<div class="form-container">
  <form>
    <div>
      <label for="nombreApellido" class="form-label">Ingrese su nombre y apellido</label>
      <input type="text" id="nombreApellido" placeholder="Juan Pérez">
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Ingrese su e-mail</label>
      <input type="email" class="form-control" id="email" placeholder="juan@correo.com">
    </div>
    <div class="mb-3">
      <label for="contraseñaMail" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="contraseñaMail">
    </div>
    <div>
      <label for="telefono" class="form-label">Ingrese su número de teléfono</label>
      <input type="number" id="telefono" placeholder="11 1234 5678">
    </div>
    <button type="submit" class="btn btn-primary">Registrarme</button>
  </form>
</div>
